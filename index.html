<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velikonoční Dobrodružství</title>
    <style>
        :root {
            --primary-green: #4ade80;
            --sky-blue: #bae6fd;
            --basket-brown: #a67c52;
            --basket-dark: #78350f;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0fdf4; 
            background-image: radial-gradient(#dcfce7 1px, transparent 1px);
            background-size: 20px 20px;
            color: #333; 
            text-align: center; 
            padding: 15px;
            margin: 0;
        }

        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 20px; 
            border-radius: 25px; 
            border: 5px solid var(--primary-green);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
        }

        h1 { color: #166534; font-size: 1.8rem; margin-bottom: 10px; }

        /* Styl úkolů */
        .ukol-box { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px dashed var(--primary-green);
            margin-bottom: 20px;
        }

        input[type="text"] { 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            width: 80%; 
            font-size: 1rem;
            outline: none;
        }

        button { 
            padding: 12px 25px; 
            background: #22c55e; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 4px 0 #16a34a;
        }

        button:active { transform: translateY(3px); box-shadow: none; }

        /* --- VIZUÁLNÍ KOŠÍK --- */
        .basket-container {
            position: relative;
            margin-top: 40px;
            padding: 20px;
            background: #fef3c7;
            border-radius: 20px;
            border: 3px solid var(--basket-brown);
        }

        .basket-handle {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 80px;
            border: 8px solid var(--basket-brown);
            border-bottom: none;
            border-radius: 80px 80px 0 0;
            z-index: 0;
        }

        .basket-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            min-height: 120px;
            background: linear-gradient(45deg, var(--basket-brown) 25%, transparent 25%), 
                        linear-gradient(-45deg, var(--basket-brown) 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, var(--basket-brown) 75%),
                        linear-gradient(-45deg, transparent 75%, var(--basket-brown) 75%);
            background-size: 20px 20px;
            background-color: #d97706; /* Pletený vzor */
            padding: 15px;
            border-radius: 15px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        /* --- STYL VAJÍČEK --- */
        .egg {
            width: 45px;
            height: 60px;
            border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
            display: inline-block;
            position: relative;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1), 2px 5px 5px rgba(0,0,0,0.2);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Vzory vajíček */
        .egg-dots { background-image: radial-gradient(rgba(255,255,255,0.5) 2px, transparent 2px); background-size: 10px 10px; }
        .egg-stripes { background-image: linear-gradient(0deg, transparent 50%, rgba(255,255,255,0.4) 50%); background-size: 100% 15px; }
        
        /* Barvy vajíček */
        .color1 { background-color: #f87171; }
        .color2 { background-color: #fb923c; }
        .color3 { background-color: #fbbf24; }
        .color4 { background-color: #a3e635; }
        .color5 { background-color: #4ade80; }
        .color6 { background-color: #2dd4bf; }
        .color7 { background-color: #38bdf8; }
        .color8 { background-color: #818cf8; }
        .color9 { background-color: #c084fc; }
        .color10 { background-color: #f472b6; }

        .egg-bad { 
            background-color: #451a03; 
            background-image: repeating-linear-gradient(45deg, #78350f, #451a03 10px);
            transform: rotate(-20deg);
            opacity: 0.8;
        }

        #feedback { margin-top: 15px; font-weight: bold; font-size: 1.1rem; }
        .success { color: #16a34a; }
        .error { color: #dc2626; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐣 Velikonoční Lov 🐣</h1>
    
    <div id="hra-zona">
        <div id="ukol-kontainer" class="ukol-box hidden">
            <h2 id="ukol-titulek">Úkol</h2>
            <p id="ukol-zadani">...</p>
            <input type="text" id="odpoved-input" placeholder="Tvoje odpověď">
            <br>
            <button id="potvrdit-btn">Odeslat odpověď</button>
            <div id="feedback"></div>
        </div>

        <div id="uvod-zprava" class="ukol-box">
            <h2>Vítej, pátrači!</h2>
            <p>Najdi ve škole QR kódy a naplň svůj košík vajíčky. Dokážeš najít všech 10?</p>
        </div>
    </div>

    <div class="basket-container">
        <div class="basket-handle"></div>
        <h3>Tvůj Košík (<span id="pocet-vajicek">0</span>/10)</h3>
        <div id="vajicka-v-kosiku" class="basket-grid">
            </div>
    </div>

    <div id="zkazene-area" class="hidden" style="margin-top: 20px;">
        <p style="color: #991b1b; font-weight: bold;">⚠️ Pozor! Tohle vajíčko páchne!</p>
        <div id="zkazene-vajicko"></div>
    </div>

    <button id="reset-btn" style="background: #94a3b8; font-size: 0.7rem; box-shadow: 0 2px 0 #64748b; margin-top: 30px;">Resetovat hru</button>
</div>

<script>
    const databazeUkolu = {
        "1": { titul: "Hádanka", zadani: "Mám kořen, ale nejsem strom. Mám zuby, ale nemám pusu. Co jsem?", odpoved: "hřeben" },
        "2": { titul: "Matematika", zadani: "Kolik je 2^3 * 2?", odpoved: "16" },
        "3": { titul: "Geografie", zadani: "Hlavní město Portugalska?", odpoved: "lisabon" },
        "4": { titul: "Šifra", zadani: "Rozlušti: ... .-.. .--. (Morseova abeceda)", odpoved: "slp" },
        "5": { titul: "Hledej v učebně", zadani: "Kolik oken je v učebně chemie?", odpoved: "4" },
        "6": { titul: "Slovní hříčka", zadani: "Přesmyčka: AKRÁVLSO (něco, co se peče)", odpoved: "vánočka" },
        "7": { titul: "Fyzika", zadani: "Jednotka elektrického odporu?", odpoved: "ohm" },
        "8": { titul: "Umění", zadani: "Kdo namaloval Monu Lisu? (Celé jméno)", odpoved: "leonardo da vinci" },
        "9": { titul: "Logika", zadani: "Doplň řadu: 1, 3, 6, 10, ...", odpoved: "15" },
        "10": { titul: "Poslední kousek", zadani: "Jak se jmenuje tento svátek?", odpoved: "velikonoce" },
        "13": { titul: "Fuj!", zadani: "Napiš slovo 'smrad', abys tohle vajíčko izoloval.", odpoved: "smrad", zkazene: true }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const aktualniUkolId = urlParams.get('ukol');

    function aktualizujVzhled() {
        let splnene = JSON.parse(localStorage.getItem('velikonocni_hra_splneno')) || {};
        const kosik = document.getElementById('vajicka-v-kosiku');
        const zkazeneDiv = document.getElementById('zkazene-vajicko');
        const zkazeneArea = document.getElementById('zkazene-area');
        let count = 0;

        kosik.innerHTML = '';
        zkazeneDiv.innerHTML = '';

        Object.keys(databazeUkolu).forEach(id => {
            if (splnene[id]) {
                const egg = document.createElement('div');
                if (databazeUkolu[id].zkazene) {
                    egg.className = 'egg egg-bad';
                    zkazeneDiv.appendChild(egg);
                    zkazeneArea.classList.remove('hidden');
                } else {
                    count++;
                    const vzor = count % 2 === 0 ? 'egg-dots' : 'egg-stripes';
                    egg.className = `egg color${count} ${vzor}`;
                    kosik.appendChild(egg);
                }
            }
        });

        document.getElementById('pocet-vajicek').innerText = count;
        if (count >= 10) {
            document.getElementById('feedback').innerHTML = '<span class="success">🏆 ÚŽASNÉ! Košík je plný!</span>';
        }
    }

    if (aktualniUkolId && databazeUkolu[aktualniUkolId]) {
        document.getElementById('uvod-zprava').classList.add('hidden');
        document.getElementById('ukol-kontainer').classList.remove('hidden');
        document.getElementById('ukol-titulek').innerText = databazeUkolu[aktualniUkolId].titul;
        document.getElementById('ukol-zadani').innerText = databazeUkolu[aktualniUkolId].zadani;

        let splnene = JSON.parse(localStorage.getItem('velikonocni_hra_splneno')) || {};
        if (splnene[aktualniUkolId]) {
            document.getElementById('feedback').innerHTML = '<span class="success">Už splněno! 🥚</span>';
            document.getElementById('odpoved-input').classList.add('hidden');
            document.getElementById('potvrdit-btn').classList.add('hidden');
        }
    }

    document.getElementById('potvrdit-btn').addEventListener('click', () => {
        const input = document.getElementById('odpoved-input').value.trim().toLowerCase();
        const spravne = databazeUkolu[aktualniUkolId].odpoved.toLowerCase();

        if (input === spravne) {
            let splnene = JSON.parse(localStorage.getItem('velikonocni_hra_splneno')) || {};
            splnene[aktualniUkolId] = true;
            localStorage.setItem('velikonocni_hra_splneno', JSON.stringify(splnene));
            
            document.getElementById('feedback').innerHTML = '<span class="success">Výborně! Vajíčko je v košíku.</span>';
            document.getElementById('odpoved-input').classList.add('hidden');
            document.getElementById('potvrdit-btn').classList.add('hidden');
            aktualizujVzhled();
        } else {
            document.getElementById('feedback').innerHTML = '<span class="error">Zkus to znovu!</span>';
        }
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
        if(confirm('Vysypat košík a začít znovu?')) {
            localStorage.removeItem('velikonocni_hra_splneno');
            location.href = location.pathname;
        }
    });

    aktualizujVzhled();
</script>

</body>
</html>
