<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velikonoční Lov</title>
    <style>
        /* --- TADY ZAČÍNÁ KOUZLO VZHLEDU --- */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #e0f2fe; 
            margin: 0; padding: 0; 
            text-align: center;
        }
        .container { 
            width: 90%; max-width: 400px; 
            background: white; margin: 20px auto; 
            border-radius: 30px; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #166534; }
        
        /* KOŠÍK */
        .basket {
            background: #d97706;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px);
            border-radius: 20px 20px 40px 40px;
            min-height: 100px; padding: 15px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;
            margin-top: 10px; border: 4px solid #92400e;
        }

        /* VAJÍČKA */
        .egg {
            width: 35px; height: 45px; border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.2);
        }
        .e1 { background: #f87171; } .e2 { background: #60a5fa; } .e3 { background: #fbbf24; }
        .e4 { background: #a78bfa; } .e5 { background: #4ade80; } .e6 { background: #f472b6; }
        .e7 { background: #2dd4bf; } .e8 { background: #fb923c; } .e9 { background: #818cf8; }
        .e10 { background: #be185d; }
        .egg-bad { background: #451a03; transform: rotate(20deg); }

        /* SCHOVÁVÁNÍ PRVKŮ */
        .hidden { display: none !important; }

        /* OSLAVA */
        #win-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #166534; color: white;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        .btn { background: #22c55e; color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐣 Velikonoční Lov</h1>
    
    <div id="ukol-kontainer" class="hidden">
        <h2 id="ukol-titulek" style="color: #d97706; margin-bottom: 5px;">Úkol</h2>
        <p id="ukol-zadani" style="margin-top: 0;">...</p>
        <input type="text" id="odpoved-input" style="padding: 10px; border-radius: 10px; border: 1px solid #ccc; width: 80%;" placeholder="Tvoje odpověď">
        <br>
        <button id="potvrdit-btn" class="btn">Odeslat</button>
        <p id="feedback" style="font-weight: bold;"></p>
    </div>

    <div id="uvod">
        <p>Najdi 10 kraslic schovaných po škole!</p>
    </div>

    <div class="basket" id="kosik">
        </div>
    <p><b>V košíku: <span id="pocet">0</span> / 10</b></p>

    <div id="zkazene-area" class="hidden">
        <p style="color: #78350f; font-size: 0.8rem;">☣️ Máš zkažené vajíčko!</p>
        <div id="zkazene-egg" style="display: flex; justify-content: center;"></div>
    </div>

    <button id="reset-btn" style="background: none; border: none; color: #94a3b8; text-decoration: underline; font-size: 0.7rem; margin-top: 20px;">Restartovat</button>
</div>

<div id="win-screen">
    <h1>🎉 MÁŠ VŠECHNA!</h1>
    <div style="background: white; color: #333; padding: 20px; border-radius: 20px; width: 80%;">
        <p>Skvělá práce! Běž si do <b>ŘEDITELNY</b> pro svou zaslouženou odměnu!</p>
    </div>
    <button onclick="document.getElementById('win-screen').style.display='none'" class="btn" style="background: #fbbf24;">Zavřít</button>
</div>

<script>
    const data = {
        "1": { t: "Hádanka", z: "Zoubky má a nekouše, po vlasech se toulá. Co je to?", o: "hřeben" },
        "2": { t: "Počty", z: "Kolik vajíček je v šesti párech?", o: "12" },
        "3": { t: "Škola", z: "Jakou barvu mají dveře do ředitelny?", o: "bílou" },
        "4": { t: "Tradice", z: "Z čeho se plete pomlázka?", o: "z proutí" },
        "5": { t: "Zvířata", z: "Které zvířátko nosí vajíčka?", o: "zajíček" },
        "6": { t: "Příroda", z: "První jarní kytička?", o: "sněženka" },
        "7": { t: "Barvy", z: "Jakou barvu má žloutek?", o: "žlutou" },
        "8": { t: "Měsíce", z: "Ve kterém měsíci letos začíná jaro?", o: "březen" },
        "9": { t: "Pečení", z: "Sladké pečivo, co vypadá jako beránek?", o: "beránek" },
        "10": { t: "Finále", z: "Napiš heslo: VELIKONOCE", o: "velikonoce" },
        "13": { t: "Fuj!", z: "Napiš 'fuj' pro izolaci zkaženého vejce.", o: "fuj", bad: true }
    };

    const params = new URLSearchParams(window.location.search);
    const id = params.get('ukol');

    function update() {
        let done = JSON.parse(localStorage.getItem('lov_v2')) || {};
        const kosik = document.getElementById('kosik');
        const zkazeneDiv = document.getElementById('zkazene-egg');
        let count = 0;
        
        kosik.innerHTML = '';
        zkazeneDiv.innerHTML = '';

        Object.keys(data).forEach(k => {
            if (done[k]) {
                const e = document.createElement('div');
                if (data[k].bad) {
                    e.className = 'egg egg-bad';
                    zkazeneDiv.appendChild(e);
                    document.getElementById('zkazene-area').classList.remove('hidden');
                } else {
                    count++;
                    e.className = `egg e${count}`;
                    kosik.appendChild(e);
                }
            }
        });
        document.getElementById('pocet').innerText = count;
        if (count >= 10) document.getElementById('win-screen').style.display = 'flex';
    }

    if (id && data[id]) {
        document.getElementById('uvod').classList.add('hidden');
        document.getElementById('ukol-kontainer').classList.remove('hidden');
        document.getElementById('ukol-titulek').innerText = data[id].t;
        document.getElementById('ukol-zadani').innerText = data[id].z;
        
        let done = JSON.parse(localStorage.getItem('lov_v2')) || {};
        if (done[id]) {
            document.getElementById('feedback').innerText = "✅ Už máš v košíku!";
            document.getElementById('odpoved-input').classList.add('hidden');
            document.getElementById('potvrdit-btn').classList.add('hidden');
        }
    }

    document.getElementById('potvrdit-btn').onclick = () => {
        const val = document.getElementById('odpoved-input').value.trim().toLowerCase();
        if (val === data[id].o.toLowerCase()) {
            let done = JSON.parse(localStorage.getItem('lov_v2')) || {};
            done[id] = true;
            localStorage.setItem('lov_v2', JSON.stringify(done));
            location.reload();
        } else {
            document.getElementById('feedback').innerText = "❌ Zkus to znovu!";
            document.getElementById('feedback').style.color = "red";
        }
    };

    document.getElementById('reset-btn').onclick = () => {
        if(confirm('Vysypat košík?')) { localStorage.clear(); location.href="index.html"; }
    };

    update();
</script>
</body>
</html>
